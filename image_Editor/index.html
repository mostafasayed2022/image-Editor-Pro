<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelFlow Pro | Professional Image Editor</title>
    <meta name="description" content="A premium, fast, and secure in-browser image editor with real-time filters and adjustments.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <h1 class="logo">Pixel<span>Flow</span></h1>
            <p class="tagline">Professional Image Adjustments</p>
        </header>

        <section class="editor-layout">
            <div class="preview-panel">
                <div class="img-box" id="img-container">
                    <img id="img" alt="Preview Image">
                    <canvas id="canvas"></canvas>
                    <div class="placeholder" id="placeholder-text">
                        <div class="placeholder-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            <p>No image selected</p>
                            <span>Upload an image to start editing</span>
                        </div>
                    </div>
                </div>
                
                <div class="action-bar">
                    <label for="upload" class="btn btn-upload">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        Upload Image
                    </label>
                    <input type="file" id="upload" accept="image/*">
                </div>
            </div>

            <aside class="controls-panel">
                <div class="controls-card">
                    <h2 class="card-title">Adjustments</h2>
                    <div class="filters-group">
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Saturate</span>
                                <span class="val-display">100%</span>
                            </div>
                            <input type="range" id="saturate" min="0" max="200" value="100">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Contrast</span>
                                <span class="val-display">100%</span>
                            </div>
                            <input type="range" id="contrast" min="0" max="200" value="100">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Brightness</span>
                                <span class="val-display">100%</span>
                            </div>
                            <input type="range" id="brightness" min="0" max="200" value="100">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Sepia</span>
                                <span class="val-display">0%</span>
                            </div>
                            <input type="range" id="sepia" min="0" max="100" value="0">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Grayscale</span>
                                <span class="val-display">0</span>
                            </div>
                            <input type="range" id="grayscale" step="0.1" min="0" max="1" value="0">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Blur</span>
                                <span class="val-display">0px</span>
                            </div>
                            <input type="range" id="blur" step="0.1" min="0" max="10" value="0">
                        </div>
                        <div class="filter-item">
                            <div class="filter-label">
                                <span>Hue-Rotate</span>
                                <span class="val-display">0°</span>
                            </div>
                            <input type="range" id="huerotate" min="0" max="360" value="0">
                        </div>
                    </div>

                    <div class="bottom-actions">
                        <button id="reset" class="btn btn-secondary">Reset All</button>
                        <a id="download" class="btn btn-primary">Download</a>
                    </div>
                </div>
            </aside>
        </section>
    </main>
    <script src="./main.js"></script>
</body>
</html>
